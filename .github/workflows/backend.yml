name: Backend image

on:
  push:
    branches: [main]
    paths: ["app/backend/**", ".github/workflows/backend.yml"]

permissions:
  id-token: write
  contents: read

# Only one backend deploy per branch at a time. We do NOT cancel-in-progress —
# AWS allows only one instance refresh per ASG. Two parallel runs would race and
# the loser would die with "InstanceRefreshInProgress". Queue them instead.
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Read ECR URL and ASG name from compute state
        run: |
          cd terraform/compute
          terraform init -input=false
          {
            echo "REPO=$(terraform output -raw ecr_repository_url)"
            echo "ASG=$(terraform output -raw asg_name)"
          } >> "$GITHUB_ENV"

      - name: Build & push image
        run: |
          cd app/backend
          # Tag with both the commit SHA (immutable) and :latest (what the LT pulls)
          docker build -t "$REPO:${GITHUB_SHA}" -t "$REPO:latest" .
          docker push "$REPO:${GITHUB_SHA}"
          docker push "$REPO:latest"

      - name: Roll the ASG so instances pull the new image
        run: |
          # Start the refresh and capture its ID so we can poll it.
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG" \
            --preferences MinHealthyPercentage=50 \
            --query 'InstanceRefreshId' --output text)
          echo "Started refresh $REFRESH_ID — waiting for it to finish..."

          # Poll every 30s until the refresh finishes. We wait (rather than fire-and-
          # forget) so the NEXT backend deploy doesn't collide with this refresh.
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].Status' --output text)
            PCT=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].PercentageComplete' --output text)
            echo "  status=$STATUS  progress=${PCT}%"
            case "$STATUS" in
              Successful)            echo "Refresh complete."; break ;;
              Failed|Cancelled)      echo "Refresh ended in $STATUS"; exit 1 ;;
              *)                     sleep 30 ;;
            esac
          done