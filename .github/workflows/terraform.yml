name: Terraform

on:
  pull_request:
    paths: ["terraform/**", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/terraform.yml"]

# OIDC needs id-token; reading the repo needs contents.
permissions:
  id-token: write
  contents: read

# Only one Terraform run per branch at a time. We do NOT cancel-in-progress —
# killing a run mid-apply leaves an orphan lock in DynamoDB that blocks every
# future run until someone force-unlocks it. Better to let the previous run
# finish cleanly and queue the new one behind it.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  # Dependency-ordered list. Apply runs the loop top-to-bottom; destroy would
  # reverse it. cicd/ is excluded since it bootstraps THIS workflow.
  STACKS: "network database compute cdn serverless-audit serverless-contact observability"

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Plan or Apply each stack
        run: |
          set -euo pipefail
          for stack in $STACKS; do
            echo "::group::terraform $stack"
            cd "terraform/$stack"
            terraform init -input=false
            # -lock-timeout=5m: if another run holds the state lock, wait up to
            # 5 minutes for it to release instead of dying immediately.
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              terraform plan -input=false -no-color -lock-timeout=5m
            else
              terraform apply -input=false -auto-approve -lock-timeout=5m
            fi
            cd - > /dev/null
            echo "::endgroup::"
          done
