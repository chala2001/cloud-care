name: Frontend deploy

# Only run when the React app changes — not when backend changes.
on:
  push:
    branches: [main]
    paths: ["app/frontend/**", ".github/workflows/frontend.yml"]

permissions:
  id-token: write
  contents: read

# One frontend deploy per branch at a time. We don't cancel-in-progress so the
# previous deploy finishes its CloudFront invalidation cleanly before the next
# one starts.
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - uses: hashicorp/setup-terraform@v3

      - name: Read S3 bucket and CloudFront distribution id from cdn state
        run: |
          cd terraform/cdn
          terraform init -input=false
          {
            echo "BUCKET=$(terraform output -raw frontend_bucket)"
            echo "DIST_ID=$(terraform output -raw cloudfront_distribution_id)"
          } >> "$GITHUB_ENV"

      - name: Read serverless API URLs from terraform state
        run: |
          # Contact API URL — strip trailing /contact so the frontend code can
          # uniformly append path segments to the base URL.
          cd terraform/serverless-contact
          terraform init -input=false
          CONTACT_FULL=$(terraform output -raw contact_api_url)
          echo "VITE_CONTACT_API_URL=${CONTACT_FULL%/contact}" >> "$GITHUB_ENV"
          cd ../serverless-audit
          terraform init -input=false
          echo "VITE_AUDIT_API_URL=$(terraform output -raw api_url)" >> "$GITHUB_ENV"

      - name: Install dependencies and build
        working-directory: app/frontend
        # VITE_API_URL is baked into the bundle at build time. Empty string means
        # the app uses relative URLs (e.g. fetch('/api/...')), which CloudFront
        # routes to the ALB origin. Override via repo variable if you need an
        # absolute URL.
        # VITE_CONTACT_API_URL and VITE_AUDIT_API_URL come from $GITHUB_ENV
        # set in the previous step, so they're already in the shell environment.
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Sync built assets to S3
        # --delete removes files in the bucket that aren't in dist/ anymore
        # (old hashed JS/CSS bundles from previous deploys).
        run: |
          aws s3 sync app/frontend/dist/ "s3://${BUCKET}/" --delete

      - name: Invalidate CloudFront cache
        # CloudFront serves index.html from edge caches; without an invalidation
        # users keep seeing the old version until the cache expires.
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          echo "Created invalidation $INVALIDATION_ID — waiting for it to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DIST_ID" \
            --id "$INVALIDATION_ID"
          echo "Invalidation complete. Site is live."
